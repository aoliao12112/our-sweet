name: Deploy Hexo Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Download Fluid theme (直接下载主题到本地)
        run: |
          mkdir -p themes/fluid
          curl -L https://github.com/fluid-dev/hexo-theme-fluid/archive/refs/tags/v1.9.9.tar.gz | tar xz --strip-components=1 -C themes/fluid

      - name: Build Hexo
        run: npm run build

      - name: List public directory contents (调试用)
        run: |
          echo "=== public 目录内容 ==="
          ls -la public/
          echo ""
          echo "=== 所有文件数量 ==="
          find public -type f | wc -l

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
